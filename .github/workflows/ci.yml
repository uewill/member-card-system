name: Member Card System CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build Backend
        working-directory: backend
        run: mvn clean package -DskipTests
      
      - name: Run Tests
        working-directory: backend
        run: mvn test
      
      - name: Build Docker Image
        working-directory: backend
        run: |
          docker build -t member-card-backend:${{ github.sha }} .
          docker tag member-card-backend:${{ github.sha }} member-card-backend:latest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build Frontend
        working-directory: frontend
        run: npm run build
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  mobile-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Get Dependencies
        working-directory: mobile
        run: flutter pub get
      
      - name: Analyze Code
        working-directory: mobile
        run: flutter analyze
      
      - name: Build APK
        working-directory: mobile
        run: flutter build apk --release