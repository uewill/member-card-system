server:
  port: 8000

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

---
spring:
  config:
    activate.on-profile: dev
  datasource:
    url: jdbc:h2:mem:membercard;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

---
spring:
  config:
    activate.on-profile: prod
  datasource:
    url: jdbc:mysql://localhost:3306/member_card?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD:root}
  sql:
    init:
      mode: never

---
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.membercard.entity
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

jwt:
  secret: MemberCardSystemSecretKeyForJwtTokenGeneration2024VeryLongSecretKey!!
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
