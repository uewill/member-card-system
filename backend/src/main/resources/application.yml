server:
  port: 8080

spring:
  application:
    name: member-card-backend
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/member_card?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: root123
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 10000ms
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.membercard.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: member-card-system-jwt-secret-key-2026
  expiration: 86400000 # 24小时

# 多租户配置
tenant:
  ignore-tables:
    - sys_global_dict
    - sys_tenant
    - flyway_schema_history